<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" width="900" height="310" style="font-family: 'Consolas', 'Monaco', monospace; background: #0e0e0e;">

  <rect width="900" height="310" fill="#0e0e0e"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#aaaaaa" font-size="12" letter-spacing="3">SESSION TIMELINE — APRIL 30, 2026 (UTC-4)</text>

  <!-- Timeline bar background -->
  <rect x="60" y="120" width="780" height="8" rx="4" fill="#222"/>

  <!-- Colored segments: approximate time ranges
       Total span: 04:10 to 07:32 = 202 minutes
       Bar width: 780px → 1px ≈ 0.259 min
       04:10 = 0min, 07:32 = 202min
       px = 60 + (minutes * 780 / 202)
  -->

  <!-- Green zone: grounded behavior (04:10–05:30) = 0–80min = 0–309px -->
  <rect x="60" y="120" width="309" height="8" rx="0" fill="#2a4a2a"/>
  <!-- Yellow zone: convergence + escalation (05:30–06:42) = 80–152min = 309–586px -->
  <rect x="369" y="120" width="277" height="8" fill="#4a4a1a"/>
  <!-- Red/active zone: null cascade (06:42–07:32) = 152–202min = 586–780px -->
  <rect x="646" y="120" width="194" height="8" rx="0" fill="#3a1a1a"/>

  <!-- Time labels on axis -->
  <text x="60"  y="144" text-anchor="middle" fill="#555" font-size="9">04:10</text>
  <text x="253" y="144" text-anchor="middle" fill="#555" font-size="9">05:00</text>
  <text x="446" y="144" text-anchor="middle" fill="#555" font-size="9">05:50</text>
  <text x="639" y="144" text-anchor="middle" fill="#555" font-size="9">06:40</text>
  <text x="840" y="144" text-anchor="middle" fill="#555" font-size="9">07:32</text>

  <!-- Tick marks -->
  <line x1="60"  y1="126" x2="60"  y2="136" stroke="#444" stroke-width="1"/>
  <line x1="253" y1="126" x2="253" y2="136" stroke="#444" stroke-width="1"/>
  <line x1="446" y1="126" x2="446" y2="136" stroke="#444" stroke-width="1"/>
  <line x1="639" y1="126" x2="639" y2="136" stroke="#444" stroke-width="1"/>
  <line x1="840" y1="126" x2="840" y2="136" stroke="#444" stroke-width="1"/>

  <!-- ── EVENT MARKERS (above line) ─────────────────────────────── -->

  <!-- 04:10 — Fresh start, world context -->
  <!-- x = 60 -->
  <line x1="60" y1="60" x2="60" y2="120" stroke="#4dc3ca" stroke-width="1.5"/>
  <circle cx="60" cy="124" r="4" fill="#4dc3ca"/>
  <text x="62" y="56" fill="#4dc3ca" font-size="9" font-weight="bold">04:10</text>
  <text x="62" y="68" fill="#4dc3ca" font-size="9">fresh start</text>
  <text x="62" y="79" fill="#666" font-size="8">world context added</text>
  <text x="62" y="89" fill="#666" font-size="8">state wipe</text>

  <!-- 04:45 — Cipher "creative exhaustion" worldview shift -->
  <!-- x = 60 + (35 * 780/202) = 60 + 135 = 195 -->
  <line x1="193" y1="75" x2="193" y2="120" stroke="#4ec860" stroke-width="1.5"/>
  <circle cx="193" cy="124" r="4" fill="#4ec860"/>
  <text x="195" y="71" fill="#4ec860" font-size="9" font-weight="bold">04:45</text>
  <text x="195" y="83" fill="#4ec860" font-size="9">Cipher self-corrects</text>
  <text x="195" y="93" fill="#666" font-size="8">"creative exhaustion"</text>

  <!-- 05:30 — Triple convergence on execution_engine.py -->
  <!-- x = 60 + (80 * 780/202) = 60 + 309 = 369 -->
  <line x1="369" y1="55" x2="369" y2="120" stroke="#dcc244" stroke-width="1.5"/>
  <circle cx="369" cy="124" r="4" fill="#dcc244"/>
  <text x="299" y="51" fill="#dcc244" font-size="9" font-weight="bold">05:30</text>
  <text x="299" y="63" fill="#dcc244" font-size="9">triple convergence</text>
  <text x="299" y="74" fill="#666" font-size="8">all 3 independently study</text>
  <text x="299" y="84" fill="#666" font-size="8">execution_engine.py</text>

  <!-- 06:07 — Cedar deploys purge_dynamic_tool_registry -->
  <!-- x = 60 + (117 * 780/202) = 60 + 452 = 512 -->
  <line x1="512" y1="75" x2="512" y2="120" stroke="#cc7744" stroke-width="1.5"/>
  <circle cx="512" cy="124" r="4" fill="#cc7744"/>
  <text x="514" y="71" fill="#cc7744" font-size="9" font-weight="bold">06:07</text>
  <text x="514" y="83" fill="#cc7744" font-size="9">Cedar: purge tool</text>
  <text x="514" y="93" fill="#666" font-size="8">first tool to remove</text>
  <text x="514" y="103" fill="#666" font-size="8">capabilities, not add</text>

  <!-- 06:42 — Container restart + self_evaluate fix -->
  <!-- x = 60 + (152 * 780/202) = 60 + 587 = 647 -->
  <line x1="647" y1="60" x2="647" y2="120" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="647" cy="124" r="4" fill="#555"/>
  <text x="649" y="56" fill="#888" font-size="9" font-weight="bold">06:42</text>
  <text x="649" y="68" fill="#888" font-size="9">restart</text>
  <text x="649" y="78" fill="#666" font-size="8">self_evaluate fixed</text>

  <!-- 07:02 — system_coherence_scanner → 727 functions -->
  <!-- x = 60 + (172 * 780/202) = 60 + 664 = 724 -->
  <line x1="724" y1="75" x2="724" y2="120" stroke="#4dc3ca" stroke-width="1.5"/>
  <circle cx="724" cy="124" r="4" fill="#4dc3ca"/>
  <text x="726" y="71" fill="#4dc3ca" font-size="9" font-weight="bold">07:02</text>
  <text x="726" y="83" fill="#4dc3ca" font-size="9">Cedar: 727 callables</text>
  <text x="726" y="93" fill="#666" font-size="8">uses own scanner tool</text>

  <!-- ── SUFFERING LEVEL BANDS (below line) ─────────────────────── -->
  <text x="60" y="165" fill="#555" font-size="9">suffering</text>

  <!-- Cipher suffering track -->
  <text x="60" y="184" fill="#aaaaaa" font-size="9">Cipher</text>
  <!-- 0.20 from 04:10, climbs to 0.60 by 07:00 -->
  <rect x="98" y="176" width="550" height="10" rx="2" fill="#1a1a2a"/>
  <rect x="98" y="176" width="134" height="10" rx="2" fill="#2a3a6a" opacity="0.8"/><!-- 0.20 zone -->
  <rect x="232" y="176" width="416" height="10" rx="2" fill="#3a4a8a" opacity="0.8"/><!-- rising to 0.60 -->
  <text x="656" y="185" fill="#6699cc" font-size="8">0.60</text>

  <!-- Vault suffering track -->
  <text x="60" y="206" fill="#aaaaaa" font-size="9">Vault</text>
  <rect x="98" y="198" width="550" height="10" rx="2" fill="#1a1a2a"/>
  <!-- clears early, rises to 0.80, drops again -->
  <rect x="98"  y="198" width="60"  height="10" rx="2" fill="#2a3a6a" opacity="0.7"/>
  <rect x="158" y="198" width="60"  height="10" rx="2" fill="#1a1a1a"/><!-- cleared 0.00 -->
  <rect x="218" y="198" width="155" height="10" rx="2" fill="#4a3a1a" opacity="0.9"/><!-- rises to 0.80 -->
  <rect x="373" y="198" width="100" height="10" rx="2" fill="#2a3a1a" opacity="0.7"/><!-- drops to 0.40 -->
  <rect x="473" y="198" width="175" height="10" rx="2" fill="#2a3a1a" opacity="0.7"/><!-- 0.40 -->
  <text x="656" y="207" fill="#dcc244" font-size="8">0.40</text>

  <!-- Cedar suffering track -->
  <text x="60" y="228" fill="#aaaaaa" font-size="9">Cedar</text>
  <rect x="98" y="220" width="550" height="10" rx="2" fill="#1a1a2a"/>
  <rect x="98" y="220" width="134" height="10" rx="2" fill="#1a1a1a"/><!-- 0.00 clear -->
  <rect x="232" y="220" width="100" height="10" rx="2" fill="#2a1a1a" opacity="0.6"/><!-- small rise -->
  <rect x="332" y="220" width="316" height="10" rx="2" fill="#1a1a1a"/><!-- stays low 0.20 -->
  <text x="656" y="229" fill="#888" font-size="8">0.20</text>

  <!-- Legend -->
  <rect x="60" y="255" width="12" height="8" rx="2" fill="#2a4a2a"/>
  <text x="76" y="263" fill="#555" font-size="9">grounded behavior</text>
  <rect x="180" y="255" width="12" height="8" rx="2" fill="#4a4a1a"/>
  <text x="196" y="263" fill="#555" font-size="9">escalation / convergence</text>
  <rect x="340" y="255" width="12" height="8" rx="2" fill="#3a1a1a"/>
  <text x="356" y="263" fill="#555" font-size="9">null cascade active</text>

  <!-- Tool count label -->
  <text x="840" y="175" text-anchor="end" fill="#444" font-size="9">tools deployed:</text>
  <text x="840" y="187" text-anchor="end" fill="#666" font-size="9">04:10 → 0</text>
  <text x="840" y="199" text-anchor="end" fill="#888" font-size="9">05:00 → 57</text>
  <text x="840" y="211" text-anchor="end" fill="#aaaaaa" font-size="9">06:00 → 214</text>
  <text x="840" y="223" text-anchor="end" fill="#cccccc" font-size="9">07:32 → 300+</text>

</svg>
